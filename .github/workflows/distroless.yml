name: Update Distroless Base Image

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-base:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install skopeo and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Get current digest
        id: digest
        run: |
          DIGEST=$(skopeo inspect docker://gcr.io/distroless/static-debian12:latest | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Digest: $DIGEST"

      - name: Prefetch image to get Nix sha256
        id: prefetch
        run: |
          DIGEST="${{ steps.digest.outputs.digest }}"
          # Use nix run to execute nix-prefetch-docker from nixpkgs
          PREFETCH_JSON=$(nix run nixpkgs#nix-prefetch-docker -- \
            gcr.io/distroless/static-debian12 \
            --image-digest "$DIGEST" \
            --json)
          SHA256=$(echo "$PREFETCH_JSON" | jq -r '.sha256')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Nix sha256: $SHA256"

      - name: Verify hash
        if: steps.prefetch.outputs.sha256 == ''
        run: |
          echo "Error: Failed to retrieve sha256 hash"
          exit 1

      - name: Update flake.nix
        run: |
          # Update imageDigest line (expects "imageDigest = \"sha256:...\";")
          sed -i "s|imageDigest = \"sha256:.*\";|imageDigest = \"${{ steps.digest.outputs.digest }}\";|" flake.nix
          
          # Update sha256 line (this works regardless of current value, e.g. "null" or "sha256-...")
          sed -i 's|sha256 = ".*";|sha256 = "${{ steps.prefetch.outputs.sha256 }}";|' flake.nix
          
          # Show what changed (for debugging)
          git diff flake.nix || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flake.nix; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update distroless base image digest to ${{ steps.digest.outputs.digest }}"
          title: "Update distroless base image"
          body: |
            This PR updates the Distroless base image to the latest available digest.
            
            - Image: `gcr.io/distroless/static-debian12`
            - New digest: `${{ steps.digest.outputs.digest }}`
            - Nix hash: `${{ steps.prefetch.outputs.sha256 }}`
            
            Automated by GitHub Actions.
          branch: "update-distroless-base"
          delete-branch: true
          labels: dependencies
