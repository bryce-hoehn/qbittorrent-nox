name: Update Base Image

on:
  schedule:
    - cron: '0 9 * * 1'   # weekly on Monday
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/podmania/base
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install skopeo and jq
        run: sudo apt-get update && sudo apt-get install -y skopeo jq

      - name: Get current digest
        id: digest
        run: |
          DIGEST=$(skopeo inspect docker://${{ env.IMAGE_NAME }}:latest | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Prefetch image hashes
        id: prefetch
        run: |
          DIGEST="${{ steps.digest.outputs.digest }}"

          AMD64_OUTPUT=$(nix run nixpkgs#nix-prefetch-docker -- \
            --image-name ${{ env.IMAGE_NAME }} \
            --image-digest "$DIGEST" \
            --arch amd64 \
            --json)
          SHA256_AMD64=$(echo "$AMD64_OUTPUT" | jq -r '.hash')
          if [[ -z "$SHA256_AMD64" || "$SHA256_AMD64" == "null" ]]; then
            echo "Failed to extract amd64 hash"
            echo "Full output: $AMD64_OUTPUT"
            exit 1
          fi
          echo "sha256_amd64=$SHA256_AMD64" >> $GITHUB_OUTPUT

          ARM64_OUTPUT=$(nix run nixpkgs#nix-prefetch-docker -- \
            --image-name ${{ env.IMAGE_NAME }} \
            --image-digest "$DIGEST" \
            --arch arm64 \
            --json)
          SHA256_ARM64=$(echo "$ARM64_OUTPUT" | jq -r '.hash')
          if [[ -z "$SHA256_ARM64" || "$SHA256_ARM64" == "null" ]]; then
            echo "Failed to extract arm64 hash"
            echo "Full output: $ARM64_OUTPUT"
            exit 1
          fi
          echo "sha256_arm64=$SHA256_ARM64" >> $GITHUB_OUTPUT

      - name: Update flake.nix
        run: |
          sed -i "s|imageDigest = \"sha256:.*\";|imageDigest = \"${{ steps.digest.outputs.digest }}\";|" flake.nix
          sed -i "s|x86_64-linux = \".*\";|x86_64-linux = \"${{ steps.prefetch.outputs.sha256_amd64 }}\";|" flake.nix
          sed -i "s|aarch64-linux = \".*\";|aarch64-linux = \"${{ steps.prefetch.outputs.sha256_arm64 }}\";|" flake.nix

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update base image"
          git push
