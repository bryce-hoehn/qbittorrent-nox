name: Update Distroless Base Image

on:
  schedule:
    - cron: '0 9 * * 1'   # weekly on Monday
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install skopeo and jq
        run: sudo apt-get update && sudo apt-get install -y skopeo jq

      - name: Get current digest
        id: digest
        run: |
          DIGEST=$(skopeo inspect docker://gcr.io/distroless/static-debian12:latest | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Prefetch image hash
        id: prefetch
        run: |
          DIGEST="${{ steps.digest.outputs.digest }}"
          OUTPUT=$(nix run nixpkgs#nix-prefetch-docker -- \
            gcr.io/distroless/static-debian12 \
            --image-digest "$DIGEST" 2>&1)

          JSON=$(echo "$OUTPUT" | sed -n '/^{/,$p' | head -n -1)
          SHA256=$(echo "$JSON" | jq -r '.hash')
          if [[ -z "$SHA256" || "$SHA256" == "null" ]]; then
            echo "Failed to extract hash"
            echo "Full output: $OUTPUT"
            exit 1
          fi
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update flake.nix
        run: |
          sed -i "s|imageDigest = \"sha256:.*\";|imageDigest = \"${{ steps.digest.outputs.digest }}\";|" flake.nix
          sed -i 's|sha256 = ".*";|sha256 = "${{ steps.prefetch.outputs.sha256 }}";|' flake.nix

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update distroless base image"
          title: "Update Distroless base image"
          body: "Updates to latest digest and hash."
          branch: "update-distroless-base"
          delete-branch: true
