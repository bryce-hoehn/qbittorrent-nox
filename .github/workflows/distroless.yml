name: Update Distroless Base Image

permissions:
  contents: write
  packages: write
  
on:
  schedule:
    - cron: '0 9 * * 1'   # weekly on Monday at 09:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  update-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Nix (with flakes enabled)
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install skopeo and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Get current digest of distroless/static-debian12:latest
        id: digest
        run: |
          DIGEST=$(skopeo inspect docker://gcr.io/distroless/static-debian12:latest | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
    
      - name: Prefetch image to get Nix sha256
        id: prefetch
        run: |
          DIGEST="${{ steps.digest.outputs.digest }}"
          nix shell nixpkgs#nix-prefetch-docker nixpkgs#jq -c \
            sh -c "nix-prefetch-docker gcr.io/distroless/static-debian12 --image-digest '$DIGEST' --json | jq -r '.sha256'" > /tmp/sha256.txt
          SHA256=$(cat /tmp/sha256.txt)
          if [ -z "$SHA256" ]; then
            echo "Failed to get sha256"
            exit 1
          fi
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Verify we got a non-empty sha256
        if: steps.prefetch.outputs.sha256 == ''
        run: |
          echo "Error: Failed to get sha256 from prefetch"
          exit 1

      - name: Update flake.nix
        run: |
          # Replace the imageDigest line
          sed -i "s|imageDigest = \"sha256:.*\";|imageDigest = \"${{ steps.digest.outputs.digest }}\";|" flake.nix
          # Replace the sha256 line (the quoted string that starts with 'sha256-')
          sed -i "s|sha256 = \"sha256-.*\";|sha256 = \"${{ steps.prefetch.outputs.sha256 }}\";|" flake.nix

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flake.nix; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update distroless base image digest to ${{ steps.digest.outputs.digest }}"
          title: "Update distroless base image"
          body: |
            Automated update of the base image digest and Nix hash.
            - Image: `gcr.io/distroless/static-debian12`
            - New digest: `${{ steps.digest.outputs.digest }}`
          branch: "update-distroless-base"
          delete-branch: true
